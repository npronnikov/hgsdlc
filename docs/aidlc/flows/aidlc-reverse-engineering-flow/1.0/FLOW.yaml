id: aidlc-reverse-engineering-flow
version: "1.0"
canonical_name: aidlc-reverse-engineering-flow@1.0
title: AIDLC Reverse Engineering (brownfield codebase analysis)
description: >
  Analyses an existing codebase and produces the full suite of AIDLC
  reverse-engineering artifacts: business overview, architecture, code structure,
  API documentation, component inventory, technology stack, dependency map, and
  code quality assessment.
  The human gate ensures the artifacts are accurate before any subsequent
  development flow starts.
start_node_id: ai-reverse-engineering
fail_on_missing_declared_output: true
fail_on_missing_expected_mutation: false

nodes:

  # ── Step 1: Analyse codebase and produce RE artifacts ─────────────────────
  - id: ai-reverse-engineering
    title: Reverse-engineer existing codebase
    type: ai
    checkpoint_before_run: false
    execution_context: []
    instruction: |
      Perform a comprehensive reverse-engineering analysis of the existing codebase.

      Follow the attached skill precisely to produce ALL of the following artifacts
      in aidlc-docs/inception/reverse-engineering/:
        - business-overview.md
        - architecture.md
        - code-structure.md
        - api-documentation.md
        - component-inventory.md
        - technology-stack.md
        - dependencies.md
        - code-quality-assessment.md
    skill_refs:
      - aidlc-reverse-engineering@1.0
    produced_artifacts:
      - scope: project
        path: aidlc-docs/inception/reverse-engineering/business-overview.md
        required: true
        modifiable: false
      - scope: project
        path: aidlc-docs/inception/reverse-engineering/architecture.md
        required: true
        modifiable: false
      - scope: project
        path: aidlc-docs/inception/reverse-engineering/code-structure.md
        required: true
        modifiable: false
      - scope: project
        path: aidlc-docs/inception/reverse-engineering/api-documentation.md
        required: true
        modifiable: false
      - scope: project
        path: aidlc-docs/inception/reverse-engineering/component-inventory.md
        required: true
        modifiable: false
      - scope: project
        path: aidlc-docs/inception/reverse-engineering/technology-stack.md
        required: true
        modifiable: false
      - scope: project
        path: aidlc-docs/inception/reverse-engineering/dependencies.md
        required: true
        modifiable: false
      - scope: project
        path: aidlc-docs/inception/reverse-engineering/code-quality-assessment.md
        required: true
        modifiable: false
    expected_mutations: []
    on_success: approve-reverse-engineering
    on_failure: terminal-complete
    allow_retry: true

  # ── Gate: Review reverse engineering artifacts ────────────────────────────
  - id: approve-reverse-engineering
    title: Review and approve reverse-engineering artifacts
    type: human_approval
    execution_context: []
    instruction: |
      Review the reverse-engineering artifacts at:
        aidlc-docs/inception/reverse-engineering/

      Verify that:
      - business-overview.md accurately describes the business domain
      - architecture.md correctly maps all packages and their relationships
      - api-documentation.md lists all relevant endpoints and contracts
      - technology-stack.md reflects the actual stack in use
      - code-quality-assessment.md identifies real technical debt

      Approve to complete this flow, or request rework with specific corrections.
    produced_artifacts: []
    expected_mutations: []
    on_approve: terminal-complete
    on_rework:
      next_node: ai-reverse-engineering

  # ── Terminal ──────────────────────────────────────────────────────────────
  - id: terminal-complete
    title: Reverse engineering complete
    type: terminal
    execution_context: []
    produced_artifacts: []
    expected_mutations: []
