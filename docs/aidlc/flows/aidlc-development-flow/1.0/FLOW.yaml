id: aidlc-development-flow
version: "1.0"
canonical_name: aidlc-development-flow@1.0
title: AIDLC Development — Construction Phase (functional design → code → test)
description: >
  Construction phase flow. Picks up after the inception flows have completed:
  aidlc-reverse-engineering-flow (brownfield), aidlc-requirements-analysis-flow,
  and aidlc-inception-design-flow. Reads existing inception artifacts
  (requirements.md, execution-plan.md, application-design.md, unit-of-work.md)
  and executes the full construction phase: functional design, NFR requirements,
  code generation planning, code generation, and build & test instructions.
  Each stage has a human approval gate with rework capability.
start_node_id: ai-functional-design
fail_on_missing_declared_output: true
fail_on_missing_expected_mutation: false

nodes:

  # ════════════════════════════════════════════════════════════════════════════
  # STEP 1 — Functional Design
  # ════════════════════════════════════════════════════════════════════════════

  - id: ai-functional-design
    title: Design business logic and domain model
    type: ai
    checkpoint_before_run: false
    execution_context: []
    instruction: |
      Load inception artifacts from the project:
        - aidlc-docs/inception/requirements/requirements.md              ← REQUIRED
        - aidlc-docs/inception/plans/execution-plan.md                  ← REQUIRED
        - aidlc-docs/inception/application-design/application-design.md ← if available
        - aidlc-docs/inception/application-design/unit-of-work.md       ← if available
        - aidlc-docs/inception/user-stories/stories.md                  ← if available
        - aidlc-docs/inception/reverse-engineering/                     ← if available (brownfield)

      Read execution-plan.md to determine which unit to work on and confirm
      that the Functional Design stage is marked EXECUTE.

      Produce a detailed, technology-agnostic functional design for the primary
      unit of work following the attached skill:
        - domain-entities.md (entity attributes, types, relationships, invariants)
        - business-rules.md (BR-* entries with pre/post conditions and error cases)
        - data-flow.md (per-operation input → transform → output)

      Save in aidlc-docs/construction/{unit-name}/functional-design/.
      Use "main-unit" as the unit name folder if execution-plan.md does not
      specify a different name.

      Do NOT read, create, or update aidlc-state.md or audit.md.
    skill_refs:
      - aidlc-functional-design@1.0
    produced_artifacts:
      - scope: project
        path: aidlc-docs/construction/main-unit/functional-design/domain-entities.md
        required: true
        modifiable: false
      - scope: project
        path: aidlc-docs/construction/main-unit/functional-design/business-rules.md
        required: true
        modifiable: false
      - scope: project
        path: aidlc-docs/construction/main-unit/functional-design/data-flow.md
        required: true
        modifiable: false
    expected_mutations: []
    on_success: approve-functional-design
    on_failure: terminal-complete
    allow_retry: true

  - id: approve-functional-design
    title: Review and approve functional design
    type: human_approval
    execution_context: []
    instruction: |
      Review aidlc-docs/construction/main-unit/functional-design/:
        - domain-entities.md
        - business-rules.md
        - data-flow.md

      Verify that domain entities are accurate, business rules are complete with
      pre/post conditions and error cases, and data flows correctly model the
      required behaviour.
      Approve to proceed to NFR requirements, or request rework with corrections.
    produced_artifacts: []
    expected_mutations: []
    on_approve: ai-nfr-requirements
    on_rework:
      next_node: ai-functional-design

  # ════════════════════════════════════════════════════════════════════════════
  # STEP 2 — NFR Requirements
  # ════════════════════════════════════════════════════════════════════════════

  - id: ai-nfr-requirements
    title: Assess non-functional requirements and technology stack
    type: ai
    checkpoint_before_run: true
    execution_context:
      - type: artifact_ref
        node_id: ai-functional-design
        path: aidlc-docs/construction/main-unit/functional-design/domain-entities.md
        scope: project
        required: true
        transfer_mode: by_value
      - type: artifact_ref
        node_id: ai-functional-design
        path: aidlc-docs/construction/main-unit/functional-design/business-rules.md
        scope: project
        required: true
        transfer_mode: by_value
      - type: artifact_ref
        node_id: ai-functional-design
        path: aidlc-docs/construction/main-unit/functional-design/data-flow.md
        scope: project
        required: true
        transfer_mode: by_value
    instruction: |
      Also load from project:
        - aidlc-docs/inception/requirements/requirements.md (for NFR mentions)
        - aidlc-docs/inception/reverse-engineering/technology-stack.md (if brownfield)

      Assess non-functional requirements for the unit following the attached skill:
      scalability, performance, availability, security, reliability, and
      maintainability. Make explicit technology stack decisions with rationale.

      Save in aidlc-docs/construction/main-unit/nfr-requirements/:
        - nfr-requirements.md
        - tech-stack-decisions.md

      Do NOT read, create, or update aidlc-state.md or audit.md.
    skill_refs:
      - aidlc-nfr-requirements@1.0
    produced_artifacts:
      - scope: project
        path: aidlc-docs/construction/main-unit/nfr-requirements/nfr-requirements.md
        required: true
        modifiable: false
      - scope: project
        path: aidlc-docs/construction/main-unit/nfr-requirements/tech-stack-decisions.md
        required: true
        modifiable: false
    expected_mutations: []
    on_success: approve-nfr
    on_failure: terminal-complete
    allow_retry: true

  - id: approve-nfr
    title: Review and approve NFR requirements
    type: human_approval
    execution_context: []
    instruction: |
      Review aidlc-docs/construction/main-unit/nfr-requirements/:
        - nfr-requirements.md
        - tech-stack-decisions.md

      Confirm that scalability, performance, security targets and technology
      choices are correct for your environment.
      Approve to proceed to code generation planning, or request rework.
    produced_artifacts: []
    expected_mutations: []
    on_approve: ai-code-generation-plan
    on_rework:
      next_node: ai-nfr-requirements

  # ════════════════════════════════════════════════════════════════════════════
  # STEP 3 — Code Generation Plan
  # ════════════════════════════════════════════════════════════════════════════

  - id: ai-code-generation-plan
    title: Create code generation plan
    type: ai
    checkpoint_before_run: true
    execution_context:
      - type: artifact_ref
        node_id: ai-functional-design
        path: aidlc-docs/construction/main-unit/functional-design/domain-entities.md
        scope: project
        required: true
        transfer_mode: by_value
      - type: artifact_ref
        node_id: ai-functional-design
        path: aidlc-docs/construction/main-unit/functional-design/business-rules.md
        scope: project
        required: true
        transfer_mode: by_value
      - type: artifact_ref
        node_id: ai-functional-design
        path: aidlc-docs/construction/main-unit/functional-design/data-flow.md
        scope: project
        required: true
        transfer_mode: by_value
      - type: artifact_ref
        node_id: ai-nfr-requirements
        path: aidlc-docs/construction/main-unit/nfr-requirements/tech-stack-decisions.md
        scope: project
        required: true
        transfer_mode: by_value
    instruction: |
      Also load from project:
        - aidlc-docs/inception/requirements/requirements.md (for DM-* and API-* sections)
        - aidlc-docs/inception/application-design/unit-of-work.md (unit boundary)
        - aidlc-docs/inception/application-design/unit-of-work-story-map.md (story mapping)
        - aidlc-docs/inception/reverse-engineering/code-structure.md (brownfield — existing files)

      Produce a numbered, checkbox-driven code generation plan following the
      attached skill. The plan must specify: exact file paths, Create vs Modify
      (brownfield), layer execution order (migrations → entities → repositories
      → services → controllers → tests → configuration), and story traceability.

      Save as aidlc-docs/construction/plans/main-unit-code-generation-plan.md.

      Do NOT read, create, or update aidlc-state.md or audit.md.
    skill_refs:
      - aidlc-code-generation-plan@1.0
    produced_artifacts:
      - scope: project
        path: aidlc-docs/construction/plans/main-unit-code-generation-plan.md
        required: true
        modifiable: false
    expected_mutations: []
    on_success: approve-code-plan
    on_failure: terminal-complete
    allow_retry: true

  - id: approve-code-plan
    title: Review and approve code generation plan
    type: human_approval
    execution_context: []
    instruction: |
      Review aidlc-docs/construction/plans/main-unit-code-generation-plan.md.
      Verify that every file to be created or modified is listed, the layer order
      is correct (migrations first, tests after each layer), and the plan covers
      all requirements and stories.
      Approve to start code generation, or request rework.
    produced_artifacts: []
    expected_mutations: []
    on_approve: ai-code-generation-execute
    on_rework:
      next_node: ai-code-generation-plan

  # ════════════════════════════════════════════════════════════════════════════
  # STEP 4 — Code Generation
  # ════════════════════════════════════════════════════════════════════════════

  - id: ai-code-generation-execute
    title: Generate code per approved plan
    type: ai
    checkpoint_before_run: true
    execution_context:
      - type: artifact_ref
        node_id: ai-code-generation-plan
        path: aidlc-docs/construction/plans/main-unit-code-generation-plan.md
        scope: project
        required: true
        transfer_mode: by_value
    instruction: |
      Execute the approved code generation plan step by step, following the
      attached skill precisely:
        - Find the first unchecked [ ] step and execute it.
        - Brownfield: modify files in-place; never create _modified copies.
        - Verify each step compiles/passes tests before marking [x].
        - Update aidlc-docs/construction/plans/main-unit-code-generation-plan.md
          with [x] marks immediately after each step.
        - Continue until all steps are [x].
        - Run the full build and all tests when complete.

      Do NOT read, create, or update aidlc-state.md or audit.md.
    skill_refs:
      - aidlc-code-generation-execute@1.0
    produced_artifacts: []
    expected_mutations: []
    on_success: approve-code
    on_failure: terminal-complete
    allow_retry: true

  - id: approve-code
    title: Review and approve implementation
    type: human_approval
    execution_context: []
    instruction: |
      Review the changes made to the workspace.
      Verify that the implementation matches the requirements and plan, all tests
      pass, and code quality meets standards.
      Approve to proceed to build and test instructions, or request rework.
    produced_artifacts: []
    expected_mutations: []
    on_approve: ai-build-and-test
    on_rework:
      next_node: ai-code-generation-execute

  # ════════════════════════════════════════════════════════════════════════════
  # STEP 5 — Build and Test Instructions
  # ════════════════════════════════════════════════════════════════════════════

  - id: ai-build-and-test
    title: Generate build and test instructions
    type: ai
    checkpoint_before_run: false
    execution_context: []
    instruction: |
      Load from project:
        - aidlc-docs/construction/plans/ (all code generation plans)
        - aidlc-docs/construction/main-unit/nfr-requirements/nfr-requirements.md

      Produce comprehensive build and test instruction files following the attached
      skill:
        - aidlc-docs/construction/build-and-test/build-instructions.md
        - aidlc-docs/construction/build-and-test/unit-test-instructions.md
        - aidlc-docs/construction/build-and-test/integration-test-instructions.md
        - aidlc-docs/construction/build-and-test/build-and-test-summary.md

      Include performance test instructions only if NFR targets were specified.
      Determine the build system and workspace root by inspecting the actual
      project structure.

      Do NOT read, create, or update aidlc-state.md or audit.md.
    skill_refs:
      - aidlc-build-and-test@1.0
    produced_artifacts:
      - scope: project
        path: aidlc-docs/construction/build-and-test/build-and-test-summary.md
        required: true
        modifiable: false
    expected_mutations: []
    on_success: approve-build-and-test
    on_failure: terminal-complete
    allow_retry: true

  - id: approve-build-and-test
    title: Review and approve build and test instructions
    type: human_approval
    execution_context: []
    instruction: |
      Review aidlc-docs/construction/build-and-test/build-and-test-summary.md
      and the accompanying instruction files.
      Confirm that build steps are correct and test coverage is adequate.
      Approve to complete the development flow.
    produced_artifacts: []
    expected_mutations: []
    on_approve: terminal-complete
    on_rework:
      next_node: ai-build-and-test

  # ════════════════════════════════════════════════════════════════════════════
  # Terminal
  # ════════════════════════════════════════════════════════════════════════════

  - id: terminal-complete
    title: Development flow complete
    type: terminal
    execution_context: []
    produced_artifacts: []
    expected_mutations: []
