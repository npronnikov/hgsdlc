services:
  postgres:
    image: postgres:16-alpine
    container_name: sdlc-postgres
    environment:
      POSTGRES_USER: sdlc
      POSTGRES_PASSWORD: sdlc
      POSTGRES_DB: sdlc
    ports:
      - "5432:5432"
    volumes:
      - sdlc-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdlc -d sdlc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sdlc-postgres-data:
