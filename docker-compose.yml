# Human Guided SDLC — полный стек в Docker (сборка backend и frontend внутри образов).
#
# Запуск:  docker compose up --build
# Только БД (для локального Gradle):  docker compose up postgres -d
#
# UI:  http://localhost:${FRONTEND_PORT:-3000}  (nginx проксирует /api → backend)
# API: http://localhost:${BACKEND_PORT:-8080}
#
# Для реальных запусков coding agent смонтируйте qwen settings и отключите skip:
#   HSDL_SKIP_AGENT_CHECK=0 и volume как в deploy/compose.prod.yml

name: ${COMPOSE_PROJECT_NAME:-hgsdlc}

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hgsdlc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hgsdlc}
      POSTGRES_DB: ${POSTGRES_DB:-hgsdlc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hgsdlc} -d ${POSTGRES_DB:-hgsdlc}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hgsdlc}
      DB_USERNAME: ${POSTGRES_USER:-hgsdlc}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hgsdlc}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:+UseContainerSupport}
      HOME: /home/app
      HSDL_SKIP_AGENT_CHECK: ${HSDL_SKIP_AGENT_CHECK:-1}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - workspace_data:/tmp/workspace
      - ${QWEN_HOME_HOST_PATH:-C:/Users/igor_/.qwen}:/home/app/.qwen:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  workspace_data:
