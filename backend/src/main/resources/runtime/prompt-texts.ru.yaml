# Локализация/тексты промпта рантайма для AI-нод.
# Комментарии у каждого поля объясняют, когда этот текст вставляется.

sections:
  # Вставляется для всех AI-нод и содержит исходный пользовательский запрос запуска.
  task_header: "Задача:"
  # Вставляется, когда есть pending rework instruction.
  request_clarification_header: "Уточнение запроса:"
  # Вставляется, когда у ноды есть instruction.
  node_instruction_header: "Инструкция:"
  # Вставляется, когда есть хотя бы один пункт во входных данных.
  inputs_header: "Доступные входные данные:"
  # Вставляется, когда есть хотя бы один ожидаемый результат.
  expected_results_header: "Ожидаемый результат:"
  # Вставляется всегда в конце промпта.
  footer: "Используй правила репозитория и доступные skills."

inputs:
  # Добавляется для artifact_ref, если ключ артефакта не вычислился. Плейсхолдер: {path}
  use_upstream_artifact_by_path: "Используй входной артефакт по пути '{path}'."
  # Добавляется для artifact_ref, если известен artifact_key. Плейсхолдеры: {artifact_key}, {path}
  use_upstream_artifact_by_key_and_path: "Используй входной артефакт '{artifact_key}' по полному пути '{path}'."

expected_results:
  # Добавляется, если есть обязательные output артефакты. Плейсхолдер: {artifacts}
  required_artifacts: "Создай и заполни обязательные артефакты: {artifacts}."
  # Добавляется, если есть обязательные run-scope output артефакты. Плейсхолдер: {paths}
  required_run_paths: "Созданные артефакты запиши строго по путям: {paths}. Перед завершением обязательно проверь, что каждый файл существует и не пустой."
  # Добавляется, если есть обязательные expected_mutations.
  required_mutations: "Внеси в репозиторий изменения, обязательные для этой задачи."
  # Добавляется всегда.
  summary: "Верни краткое резюме выполненной работы."
