# Runtime prompt localization/texts for AI nodes.
# Field comments explain when each text is injected.

sections:
  # Inserted for all AI nodes; contains the original user request for this run.
  task_header: "Task:"
  # Inserted when a pending rework instruction exists.
  request_clarification_header: "Request clarification:"
  # Inserted when the node contains instruction text.
  node_instruction_header: "Instruction:"
  # Inserted when at least one input item exists.
  inputs_header: "Available inputs:"
  # Inserted when at least one expected result exists.
  expected_results_header: "Expected result:"
  # Always inserted at the end of the prompt.
  footer: "Use repository rules and available skills."

inputs:
  # Added for artifact_ref when artifact key cannot be resolved. Placeholder: {path}
  use_upstream_artifact_by_path: "Use the input artifact by path '{path}'."
  # Added for artifact_ref when artifact_key is known. Placeholders: {artifact_key}, {path}
  use_upstream_artifact_by_key_and_path: "Use the input artifact '{artifact_key}' by full path '{path}'."

expected_results:
  # Added when required output artifacts exist. Placeholder: {artifacts}
  required_artifacts: "Create and fill required artifacts: {artifacts}."
  # Added when required run-scope output artifacts exist. Placeholder: {paths}
  required_run_paths: "Write generated artifacts strictly to these paths: {paths}. Before finishing, verify each file exists and is not empty."
  # Added when required expected_mutations exist.
  required_mutations: "Apply repository changes required for this task."
  # Always added.
  summary: "Return a brief summary of completed work."
