server:
  port: 8080

spring:
  application:
    name: human-guided-sdlc
  datasource:
    url: ${DB_URL:jdbc:h2:mem:hgsdlc;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  h2:
    console:
      enabled: true
      path: /h2-console

auth:
  session-ttl-seconds: 86400
  seed-users:
    - username: admin
      display-name: All Roles
      password: admin
      roles: [ADMIN, FLOW_CONFIGURATOR, PRODUCT_OWNER, TECH_APPROVER]
    - username: flow_configurator
      display-name: Flow Configurator
      password: admin
      roles: [FLOW_CONFIGURATOR]
    - username: product_owner
      display-name: Product Owner
      password: admin
      roles: [PRODUCT_OWNER]
    - username: tech_approver
      display-name: Tech Approver
      password: admin
      roles: [TECH_APPROVER]

runtime:
  # Approximate budget for all execution_context artifact_ref entries with transfer_mode=by_value per node run.
  max-inline-artifact-tokens: 16384
