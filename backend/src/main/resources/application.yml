server:
  port: 8080

spring:
  application:
    name: human-guided-sdlc
  datasource:
    url: ${DB_URL:jdbc:h2:mem:hgsdlc;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    drop-first: ${DB_RESET:false}
  h2:
    console:
      enabled: true
      path: /h2-console

auth:
  session-ttl-seconds: 86400
  seed-users:
    - username: admin
      display-name: All Roles
      password: admin
      roles: [ADMIN, FLOW_CONFIGURATOR, PRODUCT_OWNER, TECH_APPROVER]
    - username: flow_configurator
      display-name: Flow Configurator
      password: admin
      roles: [FLOW_CONFIGURATOR]
    - username: product_owner
      display-name: Product Owner
      password: admin
      roles: [PRODUCT_OWNER]
    - username: tech_approver
      display-name: Tech Approver
      password: admin
      roles: [TECH_APPROVER]

logging:
  level:
    ru.hgd.sdlc.benchmark: DEBUG
    ru.hgd.sdlc.runtime.application.ClaudeCodingAgentStrategy: DEBUG

catalog:
  seed:
    repo-url: https://github.com/npronnikov/catalog.git
    default-branch: main

runtime:
  # Approximate budget for all execution_context artifact_ref entries with transfer_mode=by_value per node run.
  max-inline-artifact-tokens: 16384

embedding:
  provider: local
  local:
    model-name: all-MiniLM-L6-v2
    dimension: 384
  openai:
    api-key: ${OPENAI_API_KEY}
    model: text-embedding-ada-002
    dimension: 1536
  similarity:
    threshold: 0.6
    max-results: 10
  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 100

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hgsdlc}
    username: ${DB_USERNAME:hgsdlc}
    password: ${DB_PASSWORD:hgsdlc}
  h2:
    console:
      enabled: false
