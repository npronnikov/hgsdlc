server:
  port: 8080

spring:
  application:
    name: human-guided-sdlc
  datasource:
    url: ${DB_URL:jdbc:h2:mem:hgsdlc;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  h2:
    console:
      enabled: true
      path: /h2-console

auth:
  session-ttl-seconds: 86400
  seed-username: admin
  seed-password: admin
  seed-role: FLOW_CONFIGURATOR
