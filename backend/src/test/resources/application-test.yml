spring:
  datasource:
    url: jdbc:tc:postgresql:16:///sdlc_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/migration/changelog.yml

logging:
  level:
    root: WARN
    ru.hgd.sdlc: DEBUG
    org.hibernate.SQL: DEBUG
    org.testcontainers: INFO
