spring:
  datasource:
    url: jdbc:h2:mem:hgsdlc_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

auth:
  seed-users:
    - username: test
      display-name: Test User
      password: test
      roles: [FLOW_CONFIGURATOR]

catalog:
  seed:
    repo-url: https://github.com/npronnikov/catalog.git
    default-branch: main
